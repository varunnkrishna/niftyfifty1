document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"513c1fed-1ac2-4757-9163-bfdae208252b\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<style>/* cyrillic-ext */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"aa8434db-e9cb-49eb-b913-f86bcf3f7852\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"6deead93-3b8d-4640-ba67-a9a3a7bc21d0\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d43fe7ce-4021-458f-bdb5-91a0bca42759\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f4e0d730-4ce8-4eb2-988c-8544b125bcc9\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"4d62629b-1af9-469c-9207-c44398fc2eb1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@f AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"248b42bd-edcd-4d87-a749-30985c27119d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* geist-sans-latin-400-normal */\n@font-face {\n  font-family: 'Geist Sans';\n  font-style: normal;\n  font-display: swap;\n  font-weight: 400;\n  src: url(\"d6f965cf-f346-4758-8be7-4d5d8019cce1\") format('woff2'), url(\"9468bf9d-eff6-4ec6-b2e8-119efcfc47e8\") format('woff');\n}<\u002Fstyle>\n<style>/* geist-mono-latin-400-normal */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-display: swap;\n  font-weight: 400;\n  src: url(\"5da4631f-657e-4747-bd98-261afbde97ad\") format('woff2'), url(\"b2d76b9b-9778-4367-8ec4-93d16ba0f9a8\") format('woff');\n}<\u002Fstyle>\n<style>\n  ::selection{ background:#8B8BF533; color:#EDEDEA; }\n  body{ margin:0; background:#0E0E10; }\n  a{ color:#8B8BF5; text-decoration:none; }\n  a:hover{ text-decoration:underline; }\n  a:focus-visible, button:focus-visible, input:focus-visible{ outline:2px solid #8B8BF5; outline-offset:2px; }\n  ::-webkit-scrollbar{ width:10px; height:10px; }\n  ::-webkit-scrollbar-thumb{ background:#26262A; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--bg:#0E0E10; --surface:#161618; --rule:#26262A; --text:#EDEDEA; --text-muted:#9A9AA2; --accent:#8B8BF5; --up:#4ADE80; --down:#F87171; --flat:#9A9AA2; background:var(--bg); color:var(--text); font-family:'Geist Sans',sans-serif; min-height:100vh; display:flex; justify-content:center;\">\n\n  <div style=\"display:flex; width:100%; max-width:1400px;\">\n\n    <!-- LEFT: sticky doc nav, dogfoods the product's own date-tree sidebar pattern -->\n    <nav style=\"width:248px; flex:none; padding:48px 24px 48px 32px; position:sticky; top:0; align-self:flex-start; height:100vh; overflow-y:auto; border-right:1px solid var(--rule);\">\n      <div style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin-bottom:4px;\">niftyfiftyone<\u002Fdiv>\n      <div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:32px;\">Design Specification<\u002Fdiv>\n\n      <div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin:0 0 8px;\">01 · Foundation<\u002Fdiv>\n      <a href=\"#thesis\" style=\"display:block; padding:5px 0; font-size:14px; color:var(--text);\">Design Thesis<\u002Fa>\n      <a href=\"#ia\" style=\"display:block; padding:5px 0; font-size:14px; color:var(--text);\">Information Architecture<\u002Fa>\n      <a href=\"#flows\" style=\"display:block; padding:5px 0; font-size:14px; color:var(--text);\">User Flows<\u002Fa>\n\n      <div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin:20px 0 8px;\">02 · Tokens<\u002Fdiv>\n      <a href=\"#tokens\" style=\"display:block; padding:5px 0; font-size:14px; color:var(--text);\">Design Tokens<\u002Fa>\n\n      <div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin:20px 0 8px;\">03 · Components<\u002Fdiv>\n      <a href=\"#components\" style=\"display:block; padding:5px 0; font-size:14px; color:var(--text);\">Component Library<\u002Fa>\n\n      <div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin:20px 0 8px;\">04 · Screens<\u002Fdiv>\n      <a href=\"#s-home\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">01 Homepage<\u002Fa>\n      <a href=\"#s-daily\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">02 Daily page<\u002Fa>\n      <a href=\"#s-premarket\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">03 Pre-Market state<\u002Fa>\n      <a href=\"#s-awaiting\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">04 Awaiting EOD<\u002Fa>\n      <a href=\"#s-eod\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">05 Completed EOD<\u002Fa>\n      <a href=\"#s-weekend\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">06 Weekend<\u002Fa>\n      <a href=\"#s-holiday\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">07 Holiday<\u002Fa>\n      <a href=\"#s-error\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">08 Error / degraded<\u002Fa>\n      <a href=\"#s-search\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">09 Search<\u002Fa>\n      <a href=\"#s-month\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">10 Month archive<\u002Fa>\n      <a href=\"#s-year\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">11 Year archive<\u002Fa>\n      <a href=\"#s-about\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">12 About<\u002Fa>\n      <a href=\"#s-mobile\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">13 Mobile<\u002Fa>\n      <a href=\"#s-tablet\" style=\"display:block; padding:4px 0; font-size:13.5px; color:var(--text-muted);\">14 Tablet<\u002Fa>\n\n      <div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin:20px 0 8px;\">05 · Close<\u002Fdiv>\n      <a href=\"#recs\" style=\"display:block; padding:5px 0; font-size:14px; color:var(--text);\">Recommendations<\u002Fa>\n    <\u002Fnav>\n\n    <!-- CENTER: the document -->\n    <main style=\"flex:1; min-width:0; padding:64px 56px 160px; max-width:840px;\">\n\n      <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px;\">Founding design spec · v1<\u002Fdiv>\n      <h1 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:40px; line-height:1.1; margin:0 0 16px;\">A quiet reference for the Indian market<\u002Fh1>\n      <p style=\"font-size:17px; line-height:1.7; color:var(--text-muted); max-width:640px; margin:0 0 56px;\">Complete product design for a daily, date-indexed archive of Nifty &amp; Sensex activity. This document is the design system: rationale, architecture, tokens, components, and every screen state, specified before a line of implementation code is written.<\u002Fp>\n\n      <!-- ================= THESIS ================= -->\n      <section id=\"thesis\" style=\"margin-bottom:72px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Foundation<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:26px; margin:0 0 20px;\">Design thesis<\u002Fh2>\n\n        <p style=\"font-size:16px; line-height:1.7; margin:0 0 16px;\">The product being designed is not a trading tool. Nobody opens it to act in the next five minutes — they open it to <em>understand what already happened<\u002Fem>, the way they'd open an encyclopedia entry or a well-kept ledger. The entire design language follows from that one distinction. A trading terminal is designed for speed under pressure: dense, blinking, colored by default. A reference is designed for calm comprehension: spacious, quiet, colored only when color means something.<\u002Fp>\n        <p style=\"font-size:16px; line-height:1.7; margin:0 0 16px;\">Three commitments carry the whole system:<\u002Fp>\n        <ul style=\"font-size:16px; line-height:1.8; padding-left:20px; margin:0 0 16px;\">\n          <li><strong>Typography is the interface.<\u002Fstrong> There is no icon language, no chart library, no card grid to learn. A serif voice for editorial trust, a grotesk for reading, a mono for every number — three families doing all the communicating.<\u002Fli>\n          <li><strong>Structure is hairlines, not containers.<\u002Fstrong> Nothing is boxed. Sections are separated by a single rule and by air. This is what makes the page feel like a document rather than an app shell — apps have panels; documents have margins.<\u002Fli>\n          <li><strong>Color is reserved for meaning.<\u002Fstrong> Green and red exist in exactly two places on the entire site: a % change, and a signal vote. They never decorate a heading, a button, or a border. The moment red/green shows up anywhere else, the page starts reading as a dashboard — which is the one thing this cannot be.<\u002Fli>\n        <\u002Ful>\n        <p style=\"font-size:16px; line-height:1.7; margin:0;\">A useful test for every decision below: <strong>would this still make sense printed in black and white, on paper, tomorrow morning?<\u002Fstrong> If a component only works because of a hover glow or a gradient fill, it's decoration and it's cut.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- ================= IA ================= -->\n      <section id=\"ia\" style=\"margin-bottom:72px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Foundation<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:26px; margin:0 0 20px;\">Information architecture<\u002Fh2>\n        <pre style=\"font-family:'Geist Mono',monospace; font-size:13px; line-height:1.7; color:var(--text); background:transparent; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:20px 0; overflow-x:auto; margin:0 0 20px;\">/                     Homepage — latest day in full + recent-days rail\n/2026/                Year archive — 12 months, day counts\n/2026/07/             Month archive — days in that month, reverse-chron\n/2026/07/11/          Day page — the core unit (trading / weekend / holiday)\n/about/               Methodology, disclaimer, data sources\n/llms.txt             Machine-readable index (not a rendered page)<\u002Fpre>\n        <p style=\"font-size:16px; line-height:1.7; margin:0 0 16px;\">Everything nests under the date tree except <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">/about/<\u002Fcode>. There is deliberately no stock-axis navigation (\"everything about Reliance\") and no tag/category system — adding either would imply a second organizing principle competing with the date, which is the one this product is built to answer authoritatively. One axis, held to completely, is what makes an archive feel trustworthy rather than improvised.<\u002Fp>\n        <p style=\"font-size:16px; line-height:1.7; margin:0;\">The left sidebar date tree is global chrome present on every page except focused reading contexts on mobile (where it becomes a drawer). It is the same three-level tree (year → month → day) everywhere — the homepage doesn't get a special nav, the about page doesn't lose it. Consistency of the shell is what makes the archive legible as one continuous thing rather than a set of page types.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- ================= FLOWS ================= -->\n      <section id=\"flows\" style=\"margin-bottom:72px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Foundation<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:26px; margin:0 0 20px;\">User flows<\u002Fh2>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:0 0 10px;\">1 — Daily check-in (the core loop)<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.7; margin:0 0 20px;\">Land on homepage (bookmark, muscle memory, or search \"nifty today\") → read today's Pre-Market section top-to-bottom → glance at the signal readout and warning → leave. Return in the afternoon → same URL → EOD section has appended below, un-scrolled position preserved conceptually (nothing above moved) → read the outcome next to the morning call. No navigation required for the entire loop — this is why the homepage renders the full day rather than a summary card linking elsewhere.<\u002Fp>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:0 0 10px;\">2 — Specific date lookup<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.7; margin:0 0 20px;\">Arrives via search engine (\"why did sensex fall 11 july 2026\") straight onto <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">/2026/07/11/<\u002Fcode>, or navigates via the date tree / month archive. The day page must be fully legible with zero shell context — the H1 states the date and index names explicitly, because a third of arrivals never see the sidebar.<\u002Fp>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:0 0 10px;\">3 — Browsing the archive<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.7; margin:0 0 20px;\">Year archive → month archive → day, drilling down; or the reverse, drilling up via breadcrumbs from a day page. Also served by the sidebar tree directly for anyone who prefers not to leave the current page. Three equivalent paths to the same destination is intentional redundancy for an archive — nobody should get stuck.<\u002Fp>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:0 0 10px;\">4 — Search<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.7; margin:0;\">Opens the command palette (click the search field or ⌘K) → types a company name, event, or date fragment → full-text results across all rendered pages → arrow keys + Enter, or click, to a day page. This is the only place client JS runs on the whole site (Pagefind), and the only place a modal/overlay pattern is justified.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- ================= TOKENS ================= -->\n      <section id=\"tokens\" style=\"margin-bottom:72px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">System<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:26px; margin:0 0 20px;\">Design tokens<\u002Fh2>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:0 0 12px;\">Color<\u002Fh3>\n        <div style=\"border-top:1px solid var(--rule);\">\n          <div style=\"display:grid; grid-template-columns:120px 100px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule); align-items:center;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">--bg<\u002Fspan><span style=\"display:flex; align-items:center; gap:8px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text-muted);\"><span style=\"width:14px; height:14px; background:#0E0E10; border:1px solid var(--rule); display:inline-block;\"><\u002Fspan>#0E0E10<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Page canvas — near-black, never pure #000<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:120px 100px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule); align-items:center;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">--surface<\u002Fspan><span style=\"display:flex; align-items:center; gap:8px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text-muted);\"><span style=\"width:14px; height:14px; background:#161618; border:1px solid var(--rule); display:inline-block;\"><\u002Fspan>#161618<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Rare raised zone — search field, active row. Prefer rules over fills.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:120px 100px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule); align-items:center;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">--rule<\u002Fspan><span style=\"display:flex; align-items:center; gap:8px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text-muted);\"><span style=\"width:14px; height:14px; background:#26262A; border:1px solid var(--rule); display:inline-block;\"><\u002Fspan>#26262A<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Hairlines — the primary structural device<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:120px 100px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule); align-items:center;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">--text<\u002Fspan><span style=\"display:flex; align-items:center; gap:8px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text-muted);\"><span style=\"width:14px; height:14px; background:#EDEDEA; border:1px solid var(--rule); display:inline-block;\"><\u002Fspan>#EDEDEA<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Primary text — warm off-white<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:120px 100px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule); align-items:center;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">--text-muted<\u002Fspan><span style=\"display:flex; align-items:center; gap:8px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text-muted);\"><span style=\"width:14px; height:14px; background:#9A9AA2; border:1px solid var(--rule); display:inline-block;\"><\u002Fspan>#9A9AA2<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Secondary text, labels, timestamps<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:120px 100px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule); align-items:center;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:var(--accent);\">--accent<\u002Fspan><span style=\"display:flex; align-items:center; gap:8px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text-muted);\"><span style=\"width:14px; height:14px; background:#8B8BF5; border:1px solid var(--rule); display:inline-block;\"><\u002Fspan>#8B8BF5<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Links, active nav, focus ring — interaction only, never emphasis<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:120px 100px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule); align-items:center;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:var(--up);\">--up<\u002Fspan><span style=\"display:flex; align-items:center; gap:8px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text-muted);\"><span style=\"width:14px; height:14px; background:#4ADE80; border:1px solid var(--rule); display:inline-block;\"><\u002Fspan>#4ADE80<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Positive Δ%, Long vote (+1) — meaning only, never decoration<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:120px 100px 1fr; gap:16px; padding:10px 0; align-items:center;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:var(--down);\">--down<\u002Fspan><span style=\"display:flex; align-items:center; gap:8px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text-muted);\"><span style=\"width:14px; height:14px; background:#F87171; border:1px solid var(--rule); display:inline-block;\"><\u002Fspan>#F87171<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Negative Δ%, Short vote (−1) — meaning only, never decoration<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:32px 0 12px;\">Typography<\u002Fh3>\n        <p style=\"font-size:15px; line-height:1.7; color:var(--text-muted); margin:0 0 16px;\">Source Serif 4 for editorial voice, Geist Sans for reading, Geist Mono for every number — the sans and mono share a superfamily so body text and data columns hold the same rhythm.<\u002Fp>\n        <div style=\"border-top:1px solid var(--rule);\">\n          <div style=\"display:grid; grid-template-columns:100px 1fr 140px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule); font-size:13px; color:var(--text-muted); font-family:'Geist Mono',monospace; text-transform:uppercase; letter-spacing:0.06em;\">\n            <span>Token<\u002Fspan><span>Size / LH<\u002Fspan><span>Family / wt<\u002Fspan><span>Use<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:100px 1fr 140px 1fr; gap:16px; padding:12px 0; border-bottom:1px solid var(--rule); align-items:baseline;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">display<\u002Fspan><span style=\"font-family:'Source Serif 4',serif; font-weight:600;\">34 / 1.15<\u002Fspan><span style=\"font-size:13px; color:var(--text-muted);\">Serif 600<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Day-page H1<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:100px 1fr 140px 1fr; gap:16px; padding:12px 0; border-bottom:1px solid var(--rule); align-items:baseline;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">h2<\u002Fspan><span style=\"font-family:'Source Serif 4',serif; font-weight:600;\">24 / 1.2<\u002Fspan><span style=\"font-size:13px; color:var(--text-muted);\">Serif 600<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Section heads (Pre-Market, EOD)<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:100px 1fr 140px 1fr; gap:16px; padding:12px 0; border-bottom:1px solid var(--rule); align-items:baseline;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">h3<\u002Fspan><span style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px;\">18 / 1.3<\u002Fspan><span style=\"font-size:13px; color:var(--text-muted);\">Serif 600<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Sub-heads (Markets Data, News)<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:100px 1fr 140px 1fr; gap:16px; padding:12px 0; border-bottom:1px solid var(--rule); align-items:baseline;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">body<\u002Fspan><span>16 / 1.6<\u002Fspan><span style=\"font-size:13px; color:var(--text-muted);\">Sans 400<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Prose, news summaries<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:100px 1fr 140px 1fr; gap:16px; padding:12px 0; border-bottom:1px solid var(--rule); align-items:baseline;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">label<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; text-transform:uppercase; letter-spacing:0.08em; font-size:12px;\">12 / 1.2<\u002Fspan><span style=\"font-size:13px; color:var(--text-muted);\">Mono 500, upper<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Eyebrows, table headers<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:100px 1fr 140px 1fr; gap:16px; padding:12px 0; align-items:baseline;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">data<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:15px;\">15 / 1.4<\u002Fspan><span style=\"font-size:13px; color:var(--text-muted);\">Mono 500, tabular<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Metric values, %, votes<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:14px; line-height:1.6; color:var(--text-muted); margin:16px 0 0;\">Two additions not in the original palette, needed once mobile and micro-copy entered scope: <strong style=\"color:var(--text);\">micro<\u002Fstrong> — 11px Geist Mono, for touch-row secondary values and pagination captions; <strong style=\"color:var(--text);\">display-sm<\u002Fstrong> — 26px Source Serif 4 600, the H1 substitute on mobile widths where 34px display begins wrapping awkwardly against dates.<\u002Fp>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:32px 0 12px;\">Spacing — 8pt system<\u002Fh3>\n        <p style=\"font-size:15px; line-height:1.7; color:var(--text-muted); margin:0 0 16px;\">A single scale, used for every margin, padding, and gap on the site. Two values fall outside strict multiples of 8 by design — 12 and 14 — reserved exclusively for table/list row padding, where 8 reads cramped and 16 loses density; they're the scale's only intentional half-steps.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:16px 24px; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:16px 0;\">\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">4 <span style=\"color:var(--text-muted);\">— icon-to-label gaps<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">8 <span style=\"color:var(--text-muted);\">— base unit; inline gaps<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">12 <span style=\"color:var(--text-muted);\">— row padding (dense)<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">14 <span style=\"color:var(--text-muted);\">— row padding (comfortable)<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">16 <span style=\"color:var(--text-muted);\">— stack gaps, card-less block spacing<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">24 <span style=\"color:var(--text-muted);\">— sub-section gaps<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">32 <span style=\"color:var(--text-muted);\">— nav item groups<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">48 <span style=\"color:var(--text-muted);\">— section rhythm (min)<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">64 <span style=\"color:var(--text-muted);\">— section rhythm (max), page top padding<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px;\">96 <span style=\"color:var(--text-muted);\">— homepage day-to-rail break<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:32px 0 12px;\">Borders &amp; elevation<\u002Fh3>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Borders:<\u002Fstrong> 1px solid <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">--rule<\u002Fcode>, everywhere, no exceptions. No border-radius on any container — 0px, hard corners, including the search overlay and mobile drawer. Rounded corners read as \"app UI\"; square edges read as \"printed page.\"<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Elevation:<\u002Fstrong> none. No box-shadow anywhere in the system. The one visual \"lift\" available is the <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">--surface<\u002Fcode> fill (used only for the search field and the active sidebar row) — a flat tonal shift, not a shadow. z-index is reserved strictly for the mobile drawer and the search overlay scrim; nothing else stacks.<\u002Fp>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:32px 0 12px;\">Grid &amp; breakpoints<\u002Fh3>\n        <div style=\"border-top:1px solid var(--rule);\">\n          <div style=\"display:grid; grid-template-columns:140px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule);\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">Desktop ≥1280<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Full 3-column shell — 248px left tree · fluid center capped 720px · 240px right ToC<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:140px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule);\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">Laptop 1024–1279<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Right ToC narrows to 200px or collapses first if content needs the room; center still 720px capped<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:140px 1fr; gap:16px; padding:10px 0; border-bottom:1px solid var(--rule);\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">Tablet 640–1023<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Right ToC collapses to a top disclosure; left tree collapses to a drawer; center becomes fluid with 32–40px side padding<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:140px 1fr; gap:16px; padding:10px 0;\">\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">Mobile ≤639<\u002Fspan><span style=\"font-size:14px; color:var(--text-muted);\">Single column, 16–20px side padding, tree + ToC both drawers/disclosures, signal table restacks per-row<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:32px 0 12px;\">Iconography<\u002Fh3>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\">No icon library, no filled glyphs. A small set of 1.5px monoline strokes, sized to the text they sit beside (14–16px box): <em>external-link arrow<\u002Fem> (every outbound news source), <em>chevron<\u002Fem> (tree disclosure, breadcrumb separators use \"/\" instead), <em>search<\u002Fem> (magnifier, palette trigger only), <em>hamburger<\u002Fem> (mobile drawer, 3 equal hairline-weight strokes). Every icon is functional, never ornamental — if a row would look \"unfinished\" without an icon, that's a typography problem, not an iconography gap.<\u002Fp>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:32px 0 12px;\">Motion<\u002Fh3>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\">Deliberately minimal — animation is the fastest way for an AI-generated-feeling site to give itself away. Durations: <strong>120ms<\u002Fstrong> micro (focus ring, link underline), <strong>180ms<\u002Fstrong> standard (drawer slide, overlay fade), ease-out only, never spring/bounce. What's permitted: link underline on hover, drawer/overlay entrance, disclosure chevron rotation, search result fade-in (results, not the whole overlay). What's never animated: numbers (no count-up), the signal readout (renders instantly, final state), scroll-triggered reveals, any parallax. <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">prefers-reduced-motion<\u002Fcode> disables all of the above with zero loss of function.<\u002Fp>\n\n        <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:17px; margin:32px 0 12px;\">Accessibility &amp; keyboard<\u002Fh3>\n        <ul style=\"font-size:15px; line-height:1.8; padding-left:20px; margin:0;\">\n          <li>Contrast: text/bg and muted/bg both meet WCAG AA (4.5:1 body, verified against #0E0E10); up/down meet AA against bg for the 15px+ data size they're used at.<\u002Fli>\n          <li>Focus: 2px solid accent outline, 2px offset, on every interactive element — no <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">outline:none<\u002Fcode> without a replacement, ever.<\u002Fli>\n          <li>Skip-to-content link, visually hidden until focused, first tab stop on every page.<\u002Fli>\n          <li>Tab order: skip-link → header (wordmark, search, github) → sidebar tree → main content → ToC. Sidebar tree is arrow-key navigable when focused (↑↓ move, → expands a year/month, Enter opens).<\u002Fli>\n          <li>⌘K / Ctrl+K opens search from anywhere; Esc closes any overlay and returns focus to its trigger.<\u002Fli>\n          <li>All data tables use real <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">&lt;table&gt;<\u002Fcode> markup with scoped headers — screen readers get \"GIFT Nifty, value +0.42%, vote +1,\" not a div soup.<\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n      <!-- ================= COMPONENTS ================= -->\n      <section id=\"components\" style=\"margin-bottom:72px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">System<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:26px; margin:0 0 8px;\">Component library<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.7; color:var(--text-muted); margin:0 0 32px;\">Fourteen components cover the entire site. Each is specified as anatomy + states; none carry a background fill or shadow unless noted.<\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:36px;\">\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">1 · Signal widget<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Anatomy:<\u002Fstrong> label row (mono, uppercase, muted) → metric→vote table (11 rows) → net-bias readout line (serif label + mono score) → warning banner (always attached, see #9).<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>States:<\u002Fstrong> full (all 11 inputs present) · partial (1–3 missing, shown as em-dash + \"unavailable,\" vote forced to 0/flat, one muted notice line beneath the table) · suppressed (≥4 missing — table still renders what exists, net-bias line replaced by a muted serif sentence, warning banner still present).<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Interaction:<\u002Fstrong> static, no hover states on values — this is a reading table, not a control surface. Row hover only highlights via a 1px background tint on <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">--surface<\u002Fcode>, purely for scan-tracking on wide screens, off on touch.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">2 · Metric row (market metrics)<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Anatomy:<\u002Fstrong> the atomic primitive underneath both the signal table and the EOD close summary: <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">label · value · Δ · [vote]<\u002Fcode>, all mono, tabular-nums, right-aligned numerics. The vote column is present only inside the signal widget; the EOD close row (Nifty/Sensex/BankNifty) uses the same primitive without it.<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Why one primitive:<\u002Fstrong> reusing the exact row shape for pre-market votes and EOD closes is what makes the two sections feel like one document rather than two different widgets bolted together.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">3 · News list<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Anatomy:<\u002Fstrong> per item — reworded headline (body, 16px, text color, the link target), one-line \"why it matters\" (body, muted), source name + relative timestamp + external-link glyph (label size, muted). Hairline between items, no numbering, no thumbnails.<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Hover:<\u002Fstrong> headline underlines on hover (accent stays reserved for actual links — the headline text itself turns accent-colored only on hover/focus, staying <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">--text<\u002Fcode> at rest so the list doesn't read as a wall of blue links).<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Empty:<\u002Fstrong> \"No qualifying pre-market items this morning\" in muted body — never hide the section, always render the empty sentence so the anatomy stays predictable day to day.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">4 · Sidebar navigation (date tree)<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Anatomy:<\u002Fstrong> year (serif, collapsible) → months (mono, indented, with day-count in muted mono) → days, only for the expanded month (mono, numeral only). Active day: 1px left rule in accent + accent text, no fill.<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Default state:<\u002Fstrong> current year and month pre-expanded, current day highlighted, older years collapsed to just the year row.<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Mobile:<\u002Fstrong> becomes a slide-in drawer from the left, triggered by the header hamburger, 180ms ease-out, scrim behind at 60% bg opacity, closes on Esc/scrim-click/selection.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">5 · Search<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Trigger:<\u002Fstrong> a quiet field in the header, <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">--surface<\u002Fcode> fill, \"Search…\" placeholder, ⌘K hint right-aligned in muted mono. Opens a centered overlay, max-width 560px, scrim behind.<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Results:<\u002Fstrong> grouped by relevance only (no tabs/filters), each row = matched page's date/title (serif-ish, actually a smaller serif) + a text snippet with the match bolded, mono breadcrumb path beneath. Arrow keys move a highlighted state (surface fill, no border), Enter navigates.<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Empty:<\u002Fstrong> \"No results for '{query}'\" plus one muted hint line: \"Try a date (11 July), an index, or a company name.\"<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">6 · Breadcrumbs<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Anatomy:<\u002Fstrong> mono, muted, \"/\"-separated: <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">2026 / July / 11<\u002Fcode>, each segment a link except the current (final) one which is plain muted text. Sits directly above the eyebrow on day/month/year pages — never on the homepage (nothing to trail from) or about page.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">7 · Tables<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>One primitive, three uses:<\u002Fstrong> signal table, EOD close summary, month-archive day list. Rules: header row is a label-style mono row with a <em>bottom<\u002Fem> hairline only (no vertical cell borders, ever); body rows separated by hairline; numeric columns right-aligned tabular mono; no zebra striping; no row shading except the transient hover tint. This restraint — one table style for the whole site — is what keeps the page from accumulating \"component drift\" over time.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">8 · Alerts (contextual notices)<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Anatomy:<\u002Fstrong> a single line of muted body text, no icon, no colored border, no background fill — indistinguishable typographically from a caption. Used for: partial-data notices, \"insufficient data\" notices, data-outage notices, config-expiry (internal only, not public-facing).<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Deliberately not:<\u002Fstrong> a colored/bannered alert box. Missing data is a fact of the archive, not an error demanding visual alarm — treating it that way would misrepresent an honest gap as a system failure.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">9 · Warning banner<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Anatomy:<\u002Fstrong> a hairline-framed (top+bottom rule, no fill) block of muted body text, 14px, max-width matching the signal table: \"Not financial advice. An automated guess from public data. Often wrong, especially about the close.\" Small \"⚠\" glyph prefix, muted, not red.<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Rule:<\u002Fstrong> a fixture, not a conditional — renders identically beside full, partial, suppressed, and even (as reduced text) any future signal state. Never hide it, never let its wording escalate to alarm styling.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">10 · Section headers<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Anatomy:<\u002Fstrong> eyebrow (mono, uppercase, +0.08em, muted, carries real info — \"PRE-MARKET · 09:05 IST\") directly above a serif H2/H3. A full-width hairline sits above the eyebrow for top-level sections (Pre-Market, EOD); sub-heads (Markets Data, News) get no rule, just the vertical rhythm. This one pattern — rule, eyebrow, serif heading — repeats at every section boundary sitewide.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">11 · Metric cards — considered, rejected<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\">A boxed \"metric card\" grid (GIFT Nifty in one tile, VIX in another, each with an icon and a colored trend arrow) was the first instinct and the first thing cut. Cards imply a dashboard grammar — scanning by shape and color instead of by reading. The metric-row table (#2) carries the identical information in less space, in the reading order a person already uses for the rest of the page, with no separate visual vocabulary to learn. <strong>No card component exists in this system.<\u002Fstrong><\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">12 · Pagination<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Anatomy:<\u002Fstrong> directional only — \"← June 2026\" / \"July 2026\" / \"August 2026 →\" as a three-part mono row, hairline above. No numbered page indicators anywhere on the site (a month never has enough days, and a year never enough months, to need them). Used at the foot of month archives (prev/next month) and year archives (prev/next year). Disabled direction (no next month yet) renders as plain muted text, un-linked, not greyed-out-with-cursor-not-allowed styling.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">13 · Date picker (jump-to-date)<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Anatomy:<\u002Fstrong> lives inside the search overlay as a secondary mode, not a separate UI surface — typing digits that parse as a date (e.g. \"11/7\" or \"jul 11\") switches the results list to a compact month grid: 7-column mono numeral grid, hairline cell dividers only (no per-cell boxes), current day a hollow accent ring, days with no page (future dates) dimmed and inert.<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Why not a standalone calendar widget:<\u002Fstrong> a persistent calendar icon/button sitting in the header would read as app chrome; folding it into search keeps the header down to wordmark + search + one external link.<\u002Fp>\n          <\u002Fdiv>\n\n          <div>\n            <h3 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">14 · Archive navigation<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Anatomy:<\u002Fstrong> the page-level combo distinct from the global sidebar tree — breadcrumb (#6) + pagination (#12) bracketing a month or year archive's list. The sidebar tree is \"where else can I go,\" archive nav is \"what's adjacent to what I'm looking at\" — both present at once on archive pages is intentional redundancy, not duplication, since they answer different questions.<\u002Fp>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ================= SCREENS ================= -->\n      <div style=\"border-top:1px solid var(--rule); padding-top:48px; margin-bottom:8px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screens<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:28px; margin:0 0 8px;\">Every screen, every state<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.7; color:var(--text-muted); margin:0 0 40px; max-width:640px;\">Fourteen specifications. Each carries layout, spacing, typography, hierarchy, interactions, hover, loading, empty, and responsive notes. The three-column shell (tree · content · ToC) is the constant; what follows are only the deltas each screen introduces.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- 01 HOMEPAGE -->\n      <section id=\"s-home\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 01<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Homepage<\u002Fh2>\n        <pre style=\"font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:16px 0; overflow-x:auto; margin:0 0 20px;\">┌─────────────────────────────────────────────┐\n│ [wordmark]        [ search ⌘K ]      [about] │\n├──────────┬──────────────────────┬─────────────┤\n│  tree    │  <today's full=\"\" day=\"\" page=\"\">          │\n│          │  Pre-Market … EOD …               │\n│          │  ════════════════════             │\n│          │  RECENT DAYS                      │\n│          │  10 Jul  Mildly Long   Nifty −0.4% │\n│          │  09 Jul  Neutral       Nifty +0.1% │\n│          │  08 Jul  Weekend                   │\n└──────────┴──────────────────────┴─────────────┘<\u002Ftoday's><\u002Fpre>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> the homepage renders zero unique markup — it is literally today's day page (screen 02/04/05, whichever state today is in) plus one appended block. No hero, no tagline banner, no \"welcome\" copy above the content.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Recent-days rail:<\u002Fstrong> appended after a 96px break + hairline. Eyebrow \"RECENT DAYS,\" then 7–10 compact rows (table primitive, #7): date (mono) · bias label (serif-weight-normal, colored only if it's the accent-neutral case — the label text itself stays <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">--text<\u002Fcode>, only the index Δ% at row-end is up/down colored) · index Δ%.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Hierarchy:<\u002Fstrong> today's content dominates (it's the entire fold); the rail is explicitly secondary — smaller type (14px vs 16px body), tighter row padding (12px vs 14px), muted date color.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Hover/interaction:<\u002Fstrong> rail rows behave like news-list rows — whole row is a link, hover underlines the date only (keeps the row from feeling like a button).<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Loading/empty:<\u002Fstrong> none — this is a static-built page; there's no client fetch to await. If today's page hasn't published yet (build lag), the homepage is simply yesterday's until the rebuild lands — never a skeleton.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Responsive:<\u002Fstrong> identical collapse rules to the day page; rail rows restack to two lines on mobile (date+label / Δ%) matching the mobile signal-table pattern.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 02 DAILY PAGE -->\n      <section id=\"s-daily\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 02<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Daily page — full anatomy<\u002Fh2>\n        <pre style=\"font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:16px 0; overflow-x:auto; margin:0 0 20px;\">2026 / July / 11                          ← breadcrumb, mono\nPRE-MARKET · 09:05 IST                     ← eyebrow\nNifty &amp; Sensex — 11 Jul 2026              ← display, serif 34px\n──────────────────────────────────────────\nMarkets Data                               ← h3\n  GIFT Nifty        +0.42%           +1\n  S&amp;P 500 o/n       −0.15%            0\n  …                                        ← metric-row × 11\nImportant News                             ← h3\n  Reworded headline → Moneycontrol · 8m\n  why it matters, one line\n  …\nSignal:  Mildly Long   +4                  ← net readout\n⚠ Not financial advice…                    ← warning banner\n══════════════════════════════════════════\nEOD · 16:10 IST\nHow markets performed today\n  Nifty close   24,812   −0.31%\n  Sensex close  81,204   −0.28%\n  Advance/Decline   …\nTop news that moved the market (×10)\nConclusion — short synthesis paragraph<\u002Fpre>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> single content column, hard-capped at 720px even on ultra-wide viewports — this is a reading-width decision, not a responsive one. Two stacked sections (Pre-Market, EOD) each opening with the rule+eyebrow+heading pattern (component #10).<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Spacing:<\u002Fstrong> 64px before Pre-Market's rule, 64px again before EOD's rule (the \"═\" divider is conceptual weight, not a heavier visual rule — same 1px, same color, just marking the bigger structural seam via the spacing around it). 24px between H3 sub-blocks. Table rows 14px vertical padding.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Typography/hierarchy:<\u002Fstrong> display serif H1 states date + both index names so the page is legible with zero shell context (search-engine landings). Eyebrows carry the actual publish timestamp — real information, not filler.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Interactions/hover:<\u002Fstrong> only links (news headlines, source names, breadcrumb segments) respond to hover — everything else on the page is static text, deliberately inert.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Loading:<\u002Fstrong> none — fully static HTML, first paint is the final paint.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Empty:<\u002Fstrong> covered per-state below (Awaiting EOD, Degraded).<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Responsive:<\u002Fstrong> see Mobile (13) / Tablet (14) for the shell collapse; the two-section stack itself never changes shape, only the signal table's row layout does.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 03 PRE-MARKET STATE -->\n      <section id=\"s-premarket\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 03<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Pre-Market state — section anatomy<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>What this is:<\u002Fstrong> a close read of Section 1 alone — the state of the page between ~08:40 and ~16:10 IST on a trading day, before EOD lands. Zooms into the internal hierarchy that screen 02's wireframe compresses.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout order (fixed, never reordered):<\u002Fstrong> Markets Data table → Important News list → Market Expectations paragraph (one short LLM-authored synthesis, body type, max ~120 words) → Signal readout → Warning banner. This order is a deliberate narrative: facts, then reporting, then interpretation, then the bet, then the caveat — never lead with the opinion.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Typography:<\u002Fstrong> Markets Data is the only all-mono block on the page (component #2); News and Expectations are body/serif-adjacent prose; the eyebrow's timestamp is the one piece of \"live\" feeling information — updated only at publish, never client-side ticking.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Hierarchy:<\u002Fstrong> the signal readout is visually the loudest moment in the section (serif label at h3 size) — but immediately followed, same visual weight of attention, by the warning banner. Neither is allowed to dominate the other.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Interactions/hover/empty:<\u002Fstrong> identical to component specs #1–#3, #9 above — no section-specific deviation.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 04 AWAITING EOD -->\n      <section id=\"s-awaiting\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 04<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Awaiting EOD — the placeholder state<\u002Fh2>\n        <pre style=\"font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:16px 0; overflow-x:auto; margin:0 0 20px;\">…Pre-Market content, complete…\n⚠ Not financial advice…\n──────────────────────────────────────────\nEOD · EXPECTED ~16:15 IST                  ← muted mono, that's it<\u002Fpre>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> one hairline + one line of muted mono text. No skeleton loader, no shimmer, no empty box reserving future height, no spinner. The reasoning: a skeleton implies the client is waiting on something; this is a static page that will simply be a different, larger file after the next scheduled build. Pretending otherwise (with a spinner) would be dishonest about how the site works.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Typography:<\u002Fstrong> matches the eyebrow style exactly (mono, uppercase, muted) so it reads as \"a heading whose content hasn't arrived\" rather than a distinct UI state.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Zero layout shift guarantee:<\u002Fstrong> when the EOD write lands, this line is replaced and content appended below the same hairline — nothing above the hairline (all of Pre-Market) ever reflows. This is enforced structurally by the sidecar-JSON/assembler model, not by CSS.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Responsive:<\u002Fstrong> unchanged across breakpoints — a single line has nothing to collapse.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 05 COMPLETED EOD -->\n      <section id=\"s-eod\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 05<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Completed EOD — section anatomy<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout order:<\u002Fstrong> Index closes (Nifty/Sensex/BankNifty, metric-row without vote column) → Advance/Decline + sector leaders/laggards (same table primitive, no color beyond the existing up/down on the numbers themselves — sector names are never color-coded, only their % figures are) → Top-10 EOD news (news-list, identical component to Pre-Market's) → Conclusion paragraph (body prose, ≤120 words, first sentence is the answer).<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Hierarchy:<\u002Fstrong> the Conclusion paragraph closes the entire day page — deliberately the last thing on the page, giving the day a narrative ending rather than trailing off after a news list.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>The credibility moment:<\u002Fstrong> this section sits directly below the untouched morning Signal readout — the open call and the close outcome are never more than one scroll apart. No \"accuracy score\" badge is added here; the juxtaposition itself is the honesty mechanism, and adding a computed score would invite exactly the gamified-dashboard feeling this product avoids.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Loading/empty/responsive:<\u002Fstrong> as screen 02 — static, no client states; sector leaders/laggards lists restack to single-column on mobile like any other table.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 06 WEEKEND -->\n      <section id=\"s-weekend\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 06<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Weekend page<\u002Fh2>\n        <pre style=\"font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:16px 0; overflow-x:auto; margin:0 0 20px;\">2026 / July / 12\nWEEKEND\nNifty &amp; Sensex — Saturday, 12 Jul 2026\n──────────────────────────────────────────\nNews\n  Reworded headline → source · time\n  why it matters\n  …<\u002Fpre>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> single section, no split, no signal, no metrics table. The display H1 still states both index names for consistency and SEO, but the eyebrow reads simply \"WEEKEND.\" One news list, same component as every other news list on the site.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Hierarchy:<\u002Fstrong> without a signal to anchor attention, the news list itself becomes the page's only content — this is fine; the page is intentionally quieter than a trading day, and shouldn't be padded to compensate.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Right rail:<\u002Fstrong> ToC collapses to a single \"News\" anchor (or disappears entirely if the news list is short enough not to need one — judgment call at build time, not a hard rule).<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Empty:<\u002Fstrong> if the RSS sweep found nothing (rare), one muted sentence: \"No market-relevant news this weekend.\" Page still publishes — a day always publishes.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 07 HOLIDAY -->\n      <section id=\"s-holiday\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 07<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Holiday page<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> identical template to Weekend, one difference — the eyebrow renders the specific closure reason: \"MARKET HOLIDAY · REPUBLIC DAY\" rather than \"WEEKEND.\" This is the only textual delta between the two states, which is correct: readers don't need a different page shape to learn markets are closed, just why.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Muhurat trading exception:<\u002Fstrong> rendered as this same holiday template with one additional muted line beneath the eyebrow noting the one-hour Diwali session — no special metrics/signal pipeline for it, per scope.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Everything else<\u002Fstrong> (news list, empty state, right rail, responsive) is identical to Weekend (06).<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 08 ERROR/DEGRADED -->\n      <section id=\"s-error\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 08<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Error / degraded — the ladder<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 16px;\">There is no \"error page\" (404 aside) — every degradation still resolves to a normal-looking day page, because the hard rule is a day always publishes. Three severities, each a small typographic delta on the same template:<\u002Fp>\n\n        <div style=\"border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:4px 0; margin:0 0 20px;\">\n          <div style=\"padding:14px 0; border-bottom:1px solid var(--rule);\">\n            <div style=\"font-family:'Geist Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:4px;\">Partial (1–3 inputs missing)<\u002Fdiv>\n            <div style=\"font-size:14.5px; line-height:1.6;\">Affected metric rows show <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">—<\u002Fcode> and \"unavailable\" in muted mono, vote forced to flat 0. One line beneath the table, muted body: \"2 of 11 inputs unavailable this morning.\" Net-bias readout still computes and renders normally from what's present.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 0; border-bottom:1px solid var(--rule);\">\n            <div style=\"font-family:'Geist Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:4px;\">Suppressed (≥4 inputs missing)<\u002Fdiv>\n            <div style=\"font-size:14.5px; line-height:1.6;\">Table renders whatever was fetched (same em-dash treatment for the rest). The net-bias line is replaced entirely by a muted serif sentence: \"Insufficient data for a signal this morning.\" Warning banner still renders beneath — it's a fixture regardless of state.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 0;\">\n            <div style=\"font-family:'Geist Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:4px;\">Outage (all metrics failed)<\u002Fdiv>\n            <div style=\"font-size:14.5px; line-height:1.6;\">The Pre-Market section degrades to the Weekend template shape: news only, plus one muted sentence where the signal would be: \"Data unavailable this morning — showing news only.\" No metrics table renders at all rather than a table of all em-dashes, which would just be noise.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Constant across all three:<\u002Fstrong> never red, never an alert icon, never a bordered/filled callout box — muted body or mono text only, exactly the alert component (#8) spec. A missing FII/DII print is a Tuesday, not an incident, and the typography should say so.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 09 SEARCH -->\n      <section id=\"s-search\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 09<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Search experience<\u002Fh2>\n        <pre style=\"font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:16px 0; overflow-x:auto; margin:0 0 20px;\">        ┌───────────────────────────────┐\n        │ 🔍 reliance                    │\n        ├───────────────────────────────┤\n        │ Nifty &amp; Sensex — 3 Jul 2026   │\n        │ …Reliance led gainers after…   │\n        │ 2026 / 07 / 03                 │\n        ├───────────────────────────────┤\n        │ Nifty &amp; Sensex — 28 Jun 2026  │\n        │ …Reliance Q1 results…          │\n        │ 2026 / 06 / 28                 │\n        └───────────────────────────────┘\n        esc to close · ↑↓ navigate · ↵ open<\u002Fpre>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> centered overlay, 560px max-width, scrim at 60% bg behind (the one place a translucent fill exists in the whole system, and it's structural — a scrim, not decoration). Field pinned to overlay top with a hairline beneath separating it from results; results list uses the news-list rhythm.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Interaction:<\u002Fstrong> the only client-JS-driven surface on the site (Pagefind), by explicit exception to the zero-JS rule. Opens via header field click or ⌘K/Ctrl+K from anywhere, closes via Esc, scrim click,
