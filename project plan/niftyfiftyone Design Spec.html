or selecting a result.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Loading:<\u002Fstrong> Pagefind's index is small and local — no spinner needed at typical query latency (sub-100ms); if a query ever takes longer, the footer hint row is replaced with \"searching…\" in muted mono rather than a spinner glyph.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Empty:<\u002Fstrong> \"No results for '{query}'\" + hint line (see component #5).<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Responsive:<\u002Fstrong> on mobile the overlay goes full-screen (no scrim needed at that point — it fills the viewport), field becomes sticky at top so results scroll beneath it; footer keyboard-hint row hides (no physical arrow keys on touch).<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 10 MONTH ARCHIVE -->\n      <section id=\"s-month\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 10<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Month archive<\u002Fh2>\n        <pre style=\"font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:16px 0; overflow-x:auto; margin:0 0 20px;\">2026 / July\nJuly 2026\n──────────────────────────────────────────\n11  Fri   Mildly Long     Nifty −0.31%\n10  Thu   Neutral         Nifty +0.08%\n09  Wed   Cautious        Nifty −0.62%\n08  Tue   Weekend\n07  Mon   Short           Nifty −1.10%\n──────────────────────────────────────────\n← June 2026                  August 2026 →<\u002Fpre>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> breadcrumb → serif H1 (\"July 2026\") → one table (component #7): day-of-month (mono) · weekday (mono, muted, 3-letter) · day-type synthesis. Trading days show bias label + index Δ%; weekend/holiday rows show just the label (\"Weekend\" / \"Republic Day\"), no metrics columns to keep the table from ragged-editing itself into misalignment.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Hierarchy:<\u002Fstrong> reverse-chronological, newest at top, matching the sidebar tree's convention exactly — no page on the site ever lists oldest-first.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Hover:<\u002Fstrong> whole row links to that day; hover tints row background to <code style=\"font-family:'Geist Mono',monospace; background:var(--surface); padding:1px 5px;\">--surface<\u002Fcode>, date column underlines.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Pagination:<\u002Fstrong> component #12 at the foot — prev/next month only, no page numbers (max 31 rows never needs them).<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Empty (future/unwritten month):<\u002Fstrong> doesn't exist as a route until at least one day in it has published — no \"coming soon\" page.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 11 YEAR ARCHIVE -->\n      <section id=\"s-year\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 11<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Year archive<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> breadcrumb → serif H1 (\"2026\") → one table: month name (serif, matches the weight of month links elsewhere) · trading-day count (mono) · date range covered. No monthly return %, no sparkline, no mini chart per row.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Deliberately removed:<\u002Fstrong> the first draft of this page put a small inline sparkline of the month's Nifty closes next to each row. Cut — it's exactly the kind of decorative data visualization the product exists to avoid, it isn't in the content schema (would require computing a new derived aggregate nowhere else in the system), and it turns a reference index into something that looks like a fund fact-sheet. A month is worth exactly what its day-count and label say; the day pages hold the substance.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Pagination/hover/empty:<\u002Fstrong> as Month archive (10) — prev/next year at the foot, row hover/link identical, a year with zero published months isn't a route.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 12 ABOUT -->\n      <section id=\"s-about\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 12<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">About page<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> the one page with no breadcrumb (nothing to trail from) and a simplified right rail (ToC of its own headings only — What this is / How the signal works / Where the data comes from / Disclaimer). Otherwise the same shell, same 720px content column, long-form prose.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Typography:<\u002Fstrong> pure editorial mode — serif H2s for each of the four sub-sections above, body prose throughout, no tables except one small one restating the signal's input list (reusing component #2's row shape) for anyone who arrives here first wanting to know what \"Mildly Long\" means before ever seeing it live.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Sidebar tree:<\u002Fstrong> present and unchanged (global chrome) — About is a page in the site, not an escape from it.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 13 MOBILE -->\n      <section id=\"s-mobile\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 13<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Mobile layouts (≤639px)<\u002Fh2>\n        <pre style=\"font-family:'Geist Mono',monospace; font-size:12px; line-height:1.6; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:16px 0; overflow-x:auto; margin:0 0 20px;\">┌───────────────────────┐\n│ ☰   niftyfiftyone   🔍 │\n├───────────────────────┤\n│ PRE-MARKET · 09:05 IST│\n│ Nifty &amp; Sensex        │\n│ — 11 Jul 2026         │  ← display-sm, 26px, wraps\n│───────────────────────│\n│ Markets Data          │\n│  GIFT Nifty           │\n│  +0.42%          +1   │  ← 2-line stacked metric row\n│  ─────────────────────│\n│  S&amp;P 500 o/n          │\n│  −0.15%           0   │\n│  …                    │\n└───────────────────────┘<\u002Fpre>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Header:<\u002Fstrong> hamburger (opens tree drawer) · wordmark, centered or left · search icon (opens full-screen search). All three are 44px touch targets minimum.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Typography deltas:<\u002Fstrong> display → display-sm (26px) to stop the date from wrapping mid-word against the index names; everything else holds its desktop size — body text does not shrink on mobile, this is a reading product and 16px body is the floor, not a maximum to trim.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Metric row restack:<\u002Fstrong> the 3-column desktop row (label · value · vote) becomes 2 lines: label alone on line 1 (14px, muted), value + vote right-aligned on line 2 (data size, full color). This is the single largest structural change mobile introduces — everywhere else, mobile is really just \"the same column, narrower.\"<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Right rail (ToC):<\u002Fstrong> gone — replaced by nothing; on a single-column reading layout with anchors this short (Pre-Market/EOD), a ToC adds a tap without saving meaningful scroll distance.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Side padding:<\u002Fstrong> 16–20px; section rhythm compresses from 48–64px to 40–48px but never below 40 — mobile should feel unhurried too.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Drawer:<\u002Fstrong> tree slides in from left, 85vw max-width capped at 320px, scrim behind, closes on selection/scrim/Esc/swipe-left.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 14 TABLET -->\n      <section id=\"s-tablet\" style=\"margin-bottom:64px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Screen 14<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:24px; margin:0 0 20px;\">Tablet layouts (640–1023px)<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Layout:<\u002Fstrong> the midpoint — content column becomes fluid (32–40px side padding) rather than a fixed 720px, since 720+240+248 no longer fits comfortably. Both tree and ToC become on-demand: tree is the same drawer as mobile (triggered by a persistent header icon, not full-width inline); ToC collapses to a single top disclosure row directly beneath the H1 — tap to expand an inline anchor list, tap again to collapse.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Typography:<\u002Fstrong> full desktop scale holds (display 34px, body 16px) — tablet has the width for it; only the shell collapses, not the type.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0 0 8px;\"><strong>Metric rows:<\u002Fstrong> stay 3-column (label · value · vote) at portrait widths ≥640px — there's enough room; the 2-line mobile restack only triggers below 640px.<\u002Fp>\n        <p style=\"font-size:15px; line-height:1.7; margin:0;\"><strong>Orientation:<\u002Fstrong> landscape tablet (often ≥1024px effective width) simply promotes to the laptop breakpoint's shell — no tablet-specific landscape template is needed.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- ================= RECS ================= -->\n      <section id=\"recs\" style=\"border-top:1px solid var(--rule); padding-top:48px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Close<\u002Fdiv>\n        <h2 style=\"font-family:'Source Serif 4',serif; font-weight:600; font-size:26px; margin:0 0 20px;\">Final implementation recommendations<\u002Fh2>\n        <ul style=\"font-size:16px; line-height:1.85; padding-left:20px; margin:0 0 16px;\">\n          <li>Build the table primitive (#7) and metric-row primitive (#2) first — every data-bearing screen in this system is a composition of those two. Get their hairline/spacing/mono rules exactly right once, reuse everywhere, resist any urge to special-case one instance.<\u002Fli>\n          <li>Ship the four fixture states named in PHASES.md Phase 1 (full trading day, awaiting-EOD, weekend, degraded) before anything else — they exercise every typographic rule in this document simultaneously and are the fastest way to catch a token used inconsistently.<\u002Fli>\n          <li>Treat the warning banner and the empty-state sentences as content, not afterthoughts — write their exact copy now, in the same editorial voice as everything else, rather than leaving \"TBD\" placeholders that ship as-is.<\u002Fli>\n          <li>Resist every future request to add a card, a chart, a colored badge, or a second accent color. This document's job is to make \"no\" the easy, obvious answer to those requests — if a new component is proposed, run it through the thesis test (would it still make sense in black and white, on paper, tomorrow morning?) before building it.<\u002Fli>\n          <li>The signal readout and warning banner are the product's one memorable beat — protect their restraint specifically. Everything else in the system is allowed to be quiet; that pairing is allowed to be the thing people screenshot.<\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:900}}\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
