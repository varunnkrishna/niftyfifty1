name: Weekend / Holiday News

# ORCHESTRATION §1 — runs every day (incl. weekdays); the resolver inside
# the script is what decides whether today actually needs a write (a
# trading day is a no-op here — handled by premarket.yml/eod.yml instead).
on:
  schedule:
    - cron: '30 5 * * *'

permissions:
  contents: write

concurrency:
  group: pipeline-write
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: pip install -e ".[dev]"

      - name: Configure git identity for the pipeline's own commits
        run: |
          git config user.name "niftyfiftyone-pipeline"
          git config user.email "pipeline@users.noreply.github.com"

      - name: Run weekend/holiday news pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python -m pipeline.orchestrate.run_news
