name: EOD

# ORCHESTRATION §1 — lands ~16:15-16:35 IST with cron drift buffer.
on:
  schedule:
    - cron: '45 10 * * 1-5'

permissions:
  contents: write

concurrency:
  group: pipeline-write
  cancel-in-progress: false

jobs:
  eod:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: pip install -e ".[dev]"

      - name: Configure git identity for the pipeline's own commits
        run: |
          git config user.name "niftyfiftyone-pipeline"
          git config user.email "pipeline@users.noreply.github.com"

      - name: Run EOD pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python -m pipeline.orchestrate.run_eod
